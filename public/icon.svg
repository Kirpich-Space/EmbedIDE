<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141418"/>
      <stop offset="50%" stop-color="#0E0E14"/>
      <stop offset="100%" stop-color="#08080C"/>
    </linearGradient>
    <linearGradient id="chipBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1C24"/>
      <stop offset="100%" stop-color="#121218"/>
    </linearGradient>
    <linearGradient id="chipInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E14"/>
      <stop offset="100%" stop-color="#08080C"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8533"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#E05E00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="24" y="24" width="464" height="464" rx="64" fill="url(#bgGrad)" stroke="#2A2A35" stroke-width="2"/>

  <!-- Subtle outer ring -->
  <rect x="40" y="40" width="432" height="432" rx="52" fill="none" stroke="#FF6B00" stroke-width="1.5" opacity="0.15"/>

  <!-- Main chip body with shadow rect behind -->
  <rect x="76" y="76" width="360" height="360" rx="32" fill="#000" opacity="0.3"/>
  <rect x="72" y="72" width="368" height="368" rx="32" fill="url(#chipBody)" stroke="#3A3A48" stroke-width="2"/>

  <!-- Chip border accent (top edge glow) -->
  <rect x="72" y="72" width="368" height="4" rx="2" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Inner die -->
  <rect x="120" y="120" width="272" height="272" rx="16" fill="url(#chipInner)" stroke="#2A2A38" stroke-width="2"/>

  <!-- Inner die subtle glow -->
  <rect x="122" y="122" width="268" height="268" rx="15" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.1"/>

  <!-- Circuit traces - left -->
  <g stroke="#FF6B00" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
    <line x1="72" y1="160" x2="120" y2="160"/>
    <line x1="72" y1="256" x2="120" y2="256"/>
    <line x1="72" y1="352" x2="120" y2="352"/>
    <!-- Right -->
    <line x1="392" y1="160" x2="440" y2="160"/>
    <line x1="392" y1="256" x2="440" y2="256"/>
    <line x1="392" y1="352" x2="440" y2="352"/>
    <!-- Top -->
    <line x1="160" y1="72" x2="160" y2="120"/>
    <line x1="256" y1="72" x2="256" y2="120"/>
    <line x1="352" y1="72" x2="352" y2="120"/>
    <!-- Bottom -->
    <line x1="160" y1="392" x2="160" y2="440"/>
    <line x1="256" y1="392" x2="256" y2="440"/>
    <line x1="352" y1="392" x2="352" y2="440"/>
  </g>

  <!-- Pin pads - left -->
  <g fill="url(#accentGrad2)" opacity="0.9">
    <rect x="56" y="152" width="16" height="8" rx="2"/>
    <rect x="56" y="248" width="16" height="8" rx="2"/>
    <rect x="56" y="344" width="16" height="8" rx="2"/>
    <!-- Right -->
    <rect x="440" y="152" width="16" height="8" rx="2"/>
    <rect x="440" y="248" width="16" height="8" rx="2"/>
    <rect x="440" y="344" width="16" height="8" rx="2"/>
    <!-- Top -->
    <rect x="152" y="56" width="8" height="16" rx="2"/>
    <rect x="248" y="56" width="8" height="16" rx="2"/>
    <rect x="344" y="56" width="8" height="16" rx="2"/>
    <!-- Bottom -->
    <rect x="152" y="440" width="8" height="16" rx="2"/>
    <rect x="248" y="440" width="8" height="16" rx="2"/>
    <rect x="344" y="440" width="8" height="16" rx="2"/>
  </g>

  <!-- Inner circuit pattern -->
  <g stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M 160 160 L 200 160 L 200 180"/>
    <circle cx="200" cy="190" r="4" fill="#FF6B00" opacity="0.8"/>
    <path d="M 160 220 L 180 220"/>
    <circle cx="190" cy="220" r="4" fill="#FF6B00" opacity="0.8"/>
    <path d="M 210 256 L 302 256"/>
    <path d="M 256 210 L 256 302"/>
    <path d="M 312 160 L 352 160 L 352 180"/>
    <circle cx="352" cy="190" r="4" fill="#FF6B00" opacity="0.8"/>
    <path d="M 160 352 L 352 352"/>
    <circle cx="200" cy="340" r="4" fill="#FF6B00" opacity="0.8"/>
    <circle cx="312" cy="340" r="4" fill="#FF6B00" opacity="0.8"/>
    <path d="M 160 300 L 190 300"/>
    <circle cx="200" cy="300" r="4" fill="#FF6B00" opacity="0.8"/>
    <path d="M 352 220 L 340 220"/>
    <path d="M 352 300 L 340 300"/>
    <circle cx="330" cy="220" r="4" fill="#FF6B00" opacity="0.8"/>
    <circle cx="330" cy="300" r="4" fill="#FF6B00" opacity="0.8"/>
  </g>

  <!-- Center dot matrix -->
  <g fill="#FF6B00" opacity="0.12">
    <circle cx="236" cy="236" r="3"/>
    <circle cx="256" cy="236" r="3"/>
    <circle cx="276" cy="236" r="3"/>
    <circle cx="236" cy="256" r="3"/>
    <circle cx="276" cy="256" r="3"/>
    <circle cx="236" cy="276" r="3"/>
    <circle cx="256" cy="276" r="3"/>
    <circle cx="276" cy="276" r="3"/>
  </g>

  <!-- Central accent glow -->
  <circle cx="256" cy="256" r="28" fill="#FF6B00" opacity="0.06"/>
  <circle cx="256" cy="256" r="10" fill="none" stroke="#FF6B00" stroke-width="1.5" opacity="0.25"/>

  <!-- Brand text "EI" -->
  <text x="256" y="278" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif" font-size="52" font-weight="700" fill="#FF6B00" text-anchor="middle" letter-spacing="4">EI</text>

  <!-- Corner decoration dots -->
  <g fill="#FF6B00" opacity="0.25">
    <circle cx="100" cy="100" r="2.5"/>
    <circle cx="412" cy="100" r="2.5"/>
    <circle cx="100" cy="412" r="2.5"/>
    <circle cx="412" cy="412" r="2.5"/>
  </g>
</svg>
